<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Hero Metric Cards</title>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Manrope:wght@500;600;700;800&display=swap');

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        background: transparent;
        font-family: "Manrope", "Aptos", "Segoe UI", sans-serif;
      }

      .cards {
        display: grid;
        grid-template-columns: repeat(4, minmax(190px, 1fr));
        gap: 14px;
        padding: 0 0 6px;
      }

      .card {
        appearance: none;
        width: 100%;
        text-align: left;
        border: 1px solid rgba(148, 163, 184, 0.14);
        border-radius: 18px;
        padding: 16px 16px 14px;
        background: linear-gradient(180deg, rgba(255, 255, 255, 0.98) 0%, rgba(247, 250, 255, 0.98) 100%);
        box-shadow: 0 12px 24px rgba(15, 23, 42, 0.05);
        cursor: pointer;
        transition: transform 140ms ease, box-shadow 140ms ease, border-color 140ms ease;
        position: relative;
        overflow: hidden;
      }

      .card::before {
        content: "";
        position: absolute;
        inset: 0 0 auto 0;
        height: 3px;
        background: var(--accent, #2457d6);
      }

      .card:hover {
        transform: translateY(-1px);
        box-shadow: 0 18px 30px rgba(15, 23, 42, 0.09);
      }

      .card.selected {
        border-color: color-mix(in srgb, var(--accent, #2457d6) 40%, #cbd5e1);
        box-shadow: 0 18px 30px color-mix(in srgb, var(--accent, #2457d6) 12%, rgba(15, 23, 42, 0.10));
        background: linear-gradient(180deg, rgba(255, 255, 255, 1) 0%, color-mix(in srgb, var(--accent, #2457d6) 5%, #f8fbff) 100%);
      }

      .top-row {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 10px;
      }

      .label-wrap {
        display: flex;
        align-items: center;
        gap: 10px;
        min-width: 0;
      }

      .dot {
        width: 10px;
        height: 10px;
        flex: 0 0 10px;
        border-radius: 999px;
        background: var(--accent, #2457d6);
        box-shadow: 0 0 0 6px color-mix(in srgb, var(--accent, #2457d6) 12%, transparent);
      }

      .pill {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        padding: 5px 8px;
        border-radius: 999px;
        background: color-mix(in srgb, var(--accent, #2457d6) 10%, white);
        color: color-mix(in srgb, var(--accent, #2457d6) 80%, #0f172a);
        border: 1px solid color-mix(in srgb, var(--accent, #2457d6) 18%, #dbe4f0);
        font-size: 0.71rem;
        font-weight: 800;
        letter-spacing: 0.04em;
        text-transform: uppercase;
      }

      .label {
        display: block;
        font-size: 0.74rem;
        text-transform: uppercase;
        letter-spacing: 0.08em;
        color: #64748b;
        font-weight: 800;
        white-space: nowrap;
      }

      .value {
        display: block;
        margin-top: 14px;
        font-size: 1.8rem;
        line-height: 1.08;
        color: #0f172a;
        font-weight: 800;
      }

      .caption {
        display: block;
        margin-top: 8px;
        color: #334155;
        font-size: 0.94rem;
        line-height: 1.32;
        font-weight: 700;
      }

      .note {
        display: block;
        margin-top: 8px;
        color: #64748b;
        font-size: 0.8rem;
        line-height: 1.35;
        font-weight: 600;
      }

      .cta {
        display: inline-flex;
        align-items: center;
        margin-top: 12px;
        color: color-mix(in srgb, var(--accent, #2457d6) 80%, #0f172a);
        font-size: 0.78rem;
        font-weight: 800;
        letter-spacing: 0.02em;
      }

      @media (max-width: 1100px) {
        .cards {
          grid-template-columns: repeat(2, minmax(190px, 1fr));
        }
      }

      @media (max-width: 820px) {
        .cards {
          gap: 12px;
        }

        .card {
          padding: 15px 15px 13px;
          border-radius: 16px;
        }

        .value {
          font-size: 1.55rem;
        }
      }

      @media (max-width: 640px) {
        .cards {
          grid-template-columns: 1fr;
          gap: 10px;
        }

        .card {
          padding: 14px;
          border-radius: 16px;
        }

        .label {
          font-size: 0.7rem;
        }

        .value {
          font-size: 1.4rem;
        }

        .caption {
          font-size: 0.86rem;
        }

        .note {
          font-size: 0.76rem;
        }
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script>
      function sendMessage(type, payload = {}) {
        window.parent.postMessage({ isStreamlitMessage: true, type, ...payload }, "*")
      }

      function setFrameHeight() {
        const height = document.documentElement.scrollHeight || document.body.scrollHeight || 154
        sendMessage("streamlit:setFrameHeight", { height })
      }

      function setComponentValue(value) {
        sendMessage("streamlit:setComponentValue", { value })
      }

      function renderCards(args) {
        const cards = Array.isArray(args.cards) ? args.cards : []
        const selectedId = args.selected_id
        const root = document.getElementById("root")
        root.innerHTML = ""

        const wrap = document.createElement("div")
        wrap.className = "cards"

        cards.forEach((card) => {
          const node = document.createElement("button")
          node.type = "button"
          node.className = `card${card.id === selectedId ? " selected" : ""}`
          node.style.setProperty("--accent", card.accent || "#2457d6")
          node.innerHTML = `
            <div class="top-row">
              <div class="label-wrap">
                <span class="dot"></span>
                <span class="label">${card.label}</span>
              </div>
              ${card.pill ? `<span class="pill">${card.pill}</span>` : ""}
            </div>
            <span class="value">${card.value}</span>
            <span class="caption">${card.caption || "Click to view details"}</span>
            ${card.note ? `<span class="note">${card.note}</span>` : ""}
            <span class="cta">Open insight</span>
          `
          node.addEventListener("click", () => {
            setComponentValue({
              event_id: `${card.id}-${Date.now()}`,
              card_id: card.id
            })
          })
          wrap.appendChild(node)
        })

        root.appendChild(wrap)
        window.setTimeout(setFrameHeight, 0)
      }

      window.addEventListener("message", (event) => {
        const message = event.data
        if (!message || message.type !== "streamlit:render") return
        renderCards(message.args || {})
      })

      window.addEventListener("load", () => {
        sendMessage("streamlit:componentReady", { apiVersion: 1 })
        setFrameHeight()
      })
    </script>
  </body>
</html>
