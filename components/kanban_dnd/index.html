<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Kanban Drag Drop</title>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Manrope:wght@500;600;700;800&display=swap');

      :root {
        --border: rgba(148, 163, 184, 0.18);
        --text: #0f172a;
        --muted: #64748b;
        --shadow: 0 22px 48px rgba(15, 23, 42, 0.08);
      }
      * { box-sizing: border-box; }
      body {
        margin: 0;
        background: transparent;
        font-family: "Manrope", "Aptos", "Segoe UI", sans-serif;
        color: var(--text);
      }
      .board {
        display: grid;
        grid-template-columns: repeat(4, minmax(260px, 1fr));
        gap: 20px;
        padding: 10px 4px 14px;
        align-items: start;
      }
      .lane {
        background: linear-gradient(180deg, rgba(255, 255, 255, 0.42) 0%, rgba(240, 246, 255, 0.48) 100%);
        border: 1px solid rgba(148, 163, 184, 0.12);
        border-radius: 22px;
        padding: 12px;
      }
      .lane-header {
        background: linear-gradient(180deg, #ffffff 0%, #f8fafc 100%);
        border: 1px solid var(--border);
        border-bottom: 4px solid var(--accent);
        border-radius: 18px;
        box-shadow: var(--shadow);
        padding: 16px 16px 14px;
        min-height: 104px;
        display: flex;
        flex-direction: column;
        justify-content: space-between;
      }
      .lane-label {
        margin: 0;
        font-size: 0.86rem;
        font-weight: 800;
        letter-spacing: 0.04em;
        text-transform: uppercase;
        color: var(--accent-deep);
      }
      .lane-percent {
        font-size: 2rem;
        font-weight: 800;
        line-height: 1;
        color: var(--accent-deep);
      }
      .lane-meta {
        color: var(--muted);
        font-size: 0.8rem;
        font-weight: 700;
      }
      .lane-body {
        margin-top: 14px;
        min-height: 700px;
        max-height: 700px;
        overflow-y: auto;
        padding: 4px;
        border-radius: 18px;
        transition: background 120ms ease, outline-color 120ms ease;
        outline: 2px dashed transparent;
        outline-offset: -4px;
      }
      .lane-body.drag-over {
        background: linear-gradient(180deg, rgba(255, 255, 255, 0.32) 0%, rgba(240, 246, 255, 0.74) 100%);
        outline-color: var(--accent);
      }
      .card {
        background: linear-gradient(180deg, #ffffff 0%, #f8fbff 100%);
        border: 1px solid var(--border);
        border-left: 6px solid var(--accent);
        border-radius: 18px;
        box-shadow: 0 12px 30px var(--shadow-color);
        padding: 15px 15px 13px;
        margin-bottom: 14px;
        cursor: grab;
        user-select: none;
        transition: transform 120ms ease, box-shadow 120ms ease, opacity 120ms ease;
      }
      .card:hover { transform: translateY(-1px); }
      .card.dragging { opacity: 0.55; cursor: grabbing; }
      .task-id {
        font-size: 0.74rem;
        letter-spacing: 0.08em;
        text-transform: uppercase;
        color: var(--muted);
        font-weight: 800;
      }
      .task-name {
        margin-top: 8px;
        font-size: 1.02rem;
        font-weight: 800;
        line-height: 1.35;
        color: var(--text);
      }
      .task-owner {
        margin-top: 10px;
        font-size: 0.9rem;
        font-weight: 700;
        color: #475569;
      }
      .empty-state {
        min-height: 120px;
        display: flex;
        align-items: center;
        justify-content: center;
        border: 1px dashed var(--border);
        border-radius: 18px;
        color: var(--muted);
        font-size: 0.9rem;
        font-weight: 700;
        background: rgba(255, 255, 255, 0.72);
      }
      @media (max-width: 1100px) {
        .board {
          grid-template-columns: repeat(2, minmax(240px, 1fr));
          gap: 16px;
        }
        .lane {
          padding: 10px;
          border-radius: 18px;
        }
        .lane-header {
          min-height: 96px;
        }
      }
      @media (max-width: 820px) {
        .board {
          grid-template-columns: 1fr;
          gap: 14px;
        }
        .lane-body {
          min-height: 460px;
          max-height: 460px;
        }
      }
      @media (max-width: 560px) {
        .board {
          padding: 6px 0 10px;
        }
        .lane {
          padding: 8px;
          border-radius: 16px;
        }
        .lane-header {
          min-height: 90px;
          padding: 14px 14px 12px;
          border-radius: 16px;
        }
        .lane-percent {
          font-size: 1.7rem;
        }
        .lane-body {
          min-height: 400px;
          max-height: 400px;
        }
        .card {
          padding: 14px 14px 12px;
          border-radius: 16px;
        }
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script>
      const stageStyles = {
        "To Do": { accent: "#64748b", accentDeep: "#334155", shadowColor: "rgba(100, 116, 139, 0.10)" },
        "In Progress": { accent: "#2563eb", accentDeep: "#1d4ed8", shadowColor: "rgba(37, 99, 235, 0.12)" },
        Review: { accent: "#f59e0b", accentDeep: "#b45309", shadowColor: "rgba(245, 158, 11, 0.14)" },
        Done: { accent: "#10b981", accentDeep: "#047857", shadowColor: "rgba(16, 185, 129, 0.14)" }
      }

      function sendMessage(type, payload = {}) {
        window.parent.postMessage({ isStreamlitMessage: true, type, ...payload }, "*")
      }

      function setFrameHeight() {
        const height = document.documentElement.scrollHeight || document.body.scrollHeight || 980
        sendMessage("streamlit:setFrameHeight", { height })
      }

      function setComponentValue(value) {
        sendMessage("streamlit:setComponentValue", { value })
      }

      function groupByStage(items, stages) {
        const grouped = {}
        stages.forEach((stage) => { grouped[stage] = [] })
        items.forEach((item) => {
          const stage = grouped[item.stage] ? item.stage : stages[0]
          grouped[stage].push(item)
        })
        return grouped
      }

      function renderBoard(args) {
        const items = Array.isArray(args.board_data) ? args.board_data : []
        const stages = Array.isArray(args.stages) ? args.stages : []
        const grouped = groupByStage(items, stages)
        const total = items.length || 1
        const root = document.getElementById("root")
        root.innerHTML = ""
        const board = document.createElement("div")
        board.className = "board"

        stages.forEach((stage) => {
          const style = stageStyles[stage] || stageStyles["In Progress"]
          const lane = document.createElement("section")
          const header = document.createElement("div")
          header.className = "lane-header"
          header.style.setProperty("--accent", style.accent)
          header.style.setProperty("--accent-deep", style.accentDeep)
          header.innerHTML = `
            <div class="lane-label">${stage}</div>
            <div class="lane-percent">${Math.round((grouped[stage].length / total) * 100)}%</div>
            <div class="lane-meta">${grouped[stage].length} tasks</div>
          `
          lane.appendChild(header)

          const body = document.createElement("div")
          body.className = "lane-body"
          body.dataset.stage = stage
          body.style.setProperty("--accent", style.accent)
          body.addEventListener("dragover", (event) => {
            event.preventDefault()
            body.classList.add("drag-over")
          })
          body.addEventListener("dragleave", () => body.classList.remove("drag-over"))
          body.addEventListener("drop", (event) => {
            event.preventDefault()
            body.classList.remove("drag-over")
            const payload = event.dataTransfer.getData("application/json")
            if (!payload) return
            const dragged = JSON.parse(payload)
            if (!dragged || dragged.from_stage === stage) return
            setComponentValue({
              event_id: `${dragged.row_id}-${Date.now()}`,
              row_id: dragged.row_id,
              task_id: dragged.task_id,
              from_stage: dragged.from_stage,
              to_stage: stage
            })
          })

          if (!grouped[stage].length) {
            const empty = document.createElement("div")
            empty.className = "empty-state"
            empty.textContent = "Drop task here"
            body.appendChild(empty)
          } else {
            grouped[stage].forEach((item) => {
              const card = document.createElement("article")
              card.className = "card"
              card.draggable = true
              card.style.setProperty("--accent", style.accent)
              card.style.setProperty("--shadow-color", style.shadowColor)
              card.innerHTML = `
                <div class="task-id">${item.task_id}</div>
                <div class="task-name">${item.task_name}</div>
                <div class="task-owner">Owner: ${item.owner}</div>
              `
              card.addEventListener("dragstart", (event) => {
                card.classList.add("dragging")
                event.dataTransfer.effectAllowed = "move"
                event.dataTransfer.setData("application/json", JSON.stringify({
                  row_id: item.row_id,
                  task_id: item.task_id,
                  from_stage: item.stage
                }))
              })
              card.addEventListener("dragend", () => card.classList.remove("dragging"))
              body.appendChild(card)
            })
          }

          lane.appendChild(body)
          board.appendChild(lane)
        })

        root.appendChild(board)
        window.setTimeout(setFrameHeight, 0)
      }

      window.addEventListener("message", (event) => {
        const message = event.data
        if (!message || message.type !== "streamlit:render") return
        renderBoard(message.args || {})
      })

      window.addEventListener("load", () => {
        sendMessage("streamlit:componentReady", { apiVersion: 1 })
        setFrameHeight()
      })
    </script>
  </body>
</html>
